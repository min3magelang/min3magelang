<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIN 3 Magelang | Admin Database</title>

  <!-- Firebase versi compat (lebih mudah) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <script>
    // CONFIG ANDA (SUDAH DIPASANGKAN)
    const firebaseConfig = {
      apiKey: "AIzaSyDFBto9fjDbdjxfrAK8QIZAmsgiXIjU5eQ",
      authDomain: "min3magelang-c0a1a.firebaseapp.com",
      databaseURL: "https://min3magelang-c0a1a-default-rtdb.firebaseio.com",
      projectId: "min3magelang-c0a1a",
      storageBucket: "min3magelang-c0a1a.firebasestorage.app",
      messagingSenderId: "465060029478",
      appId: "1:465060029478:web:48c8f17b2e151baa8c32e7"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function tambahPengumuman() {
      let isi = document.getElementById('inputPengumuman').value;
      if(isi.trim() === '') return alert('Isi tidak boleh kosong');
      db.ref('pengumuman').push({ text: isi });
      document.getElementById('inputPengumuman').value = '';
    }

    function tampilPengumuman() {
      const list = document.getElementById('listPengumuman');
      db.ref('pengumuman').on('value', snapshot => {
        list.innerHTML = '';
        snapshot.forEach(child => {
          let li = document.createElement('li');
          li.textContent = child.val().text;
          list.appendChild(li);
        });
      });
    }

    window.onload = tampilPengumuman;
  </script>

  <style>
    body {font-family: Arial; background:#eef2f7; margin:0;}
    header {background:#1a5bb8; color:white; padding:20px; text-align:center;}
    .container {max-width:900px; margin:auto; padding:20px;}
    .card {background:white; padding:20px; border-radius:10px; margin-bottom:15px;}
    button {padding:8px 12px;}
  </style>
</head>
<body>

<header>
  <h1>Admin MIN 3 Magelang (Database Aktif)</h1>
</header>

<div class="container">

  <div class="card">
    <h2>Tambah Pengumuman</h2>
    <input type="text" id="inputPengumuman" placeholder="Tulis pengumuman">
    <button onclick="tambahPengumuman()">Tambah</button>
  </div>

  <div class="card">
    <h2>Pengumuman</h2>
    <ul id="listPengumuman"></ul>
  </div>

</div>

</body>
</html>
