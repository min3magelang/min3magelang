<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIN 3 Magelang</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDFBto9fjDbdjxfrAK8QIZAmsgiXIjU5eQ",
  authDomain: "min3magelang-c0a1a.firebaseapp.com",
  databaseURL: "https://min3magelang-c0a1a-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "min3magelang-c0a1a",
  storageBucket: "min3magelang-c0a1a.firebasestorage.app",
  messagingSenderId: "465060029478",
  appId: "1:465060029478:web:48c8f17b2e151baa8c32e7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let isAdmin = false;

// LOGIN
function login() {
  const email = document.getElementById('email').value;
  const pass = document.getElementById('password').value;

  firebase.auth().signInWithEmailAndPassword(email, pass)
    .then(() => alert('Login berhasil'))
    .catch(() => alert('Login gagal'));
}

// LOGOUT
function logout() {
  firebase.auth().signOut();
}

// CEK LOGIN
firebase.auth().onAuthStateChanged(function(user) {
  if (user) {
    isAdmin = true;
    document.getElementById('adminPanel').style.display = 'block';
  } else {
    isAdmin = false;
    document.getElementById('adminPanel').style.display = 'none';
  }
});

// TAMBAH FOTO
function tambahFoto() {
  const judul = document.getElementById('judulFoto').value;
  const link = document.getElementById('linkFoto').value;

  if (judul === "" || link === "") return alert("Isi semua!");

  db.ref('galeri').push({ judul, url: link });

  document.getElementById('judulFoto').value = "";
  document.getElementById('linkFoto').value = "";
}

// HAPUS FOTO
function hapusFoto(id) {
  if (confirm("Hapus foto ini?")) {
    db.ref('galeri/' + id).remove();
  }
}

// TAMPIL GALERI
function tampilGaleri() {
  const galeri = document.getElementById('galeri');

  db.ref('galeri').on('value', snapshot => {
    galeri.innerHTML = "";

    snapshot.forEach(child => {
      const data = child.val();
      const id = child.key;

      let card = document.createElement('div');
      card.className = "foto-card";

      let img = document.createElement('img');
      img.src = data.url;

      let title = document.createElement('p');
      title.textContent = data.judul;

      card.appendChild(img);
      card.appendChild(title);

      // tombol hapus hanya admin
      if (isAdmin) {
        let btn = document.createElement('button');
        btn.textContent = "Hapus";
        btn.onclick = () => hapusFoto(id);
        card.appendChild(btn);
      }

      galeri.appendChild(card);
    });
  });
}

window.onload = tampilGaleri;
</script>

<style>
body {font-family: Arial; background:#eef2f7; margin:0;}
header {background:#1a5bb8; color:white; padding:20px; text-align:center;}
.container {max-width:1000px; margin:auto; padding:20px;}
.card {background:white; padding:20px; border-radius:10px; margin-bottom:20px;}

#galeri {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 15px;
}

.foto-card {
  background:white;
  padding:10px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.foto-card img {
  width:100%;
  border-radius:8px;
}

button {
  margin-top:5px;
  padding:5px 8px;
  background:#d9534f;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

button:hover {
  background:#c9302c;
}
</style>

</head>

<body>

<header>
<h1>MIN 3 MAGELANG</h1>
</header>

<div class="container">

<div class="card">
<h2>Login Admin</h2>
<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
</div>

<div id="adminPanel" class="card" style="display:none;">
<h2>Tambah Foto</h2>
<input type="text" id="judulFoto" placeholder="Judul foto"><br><br>
<input type="text" id="linkFoto" placeholder="Link gambar"><br><br>
<button onclick="tambahFoto()">Tambah</button>
</div>

<div class="card">
<h2>Galeri Sekolah</h2>
<div id="galeri"></div>
</div>

</div>

</body>
</html>
